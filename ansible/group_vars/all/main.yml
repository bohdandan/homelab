homelab:
  domain:
    root: magnetic-marten.com
    subzone: homelab.magnetic-marten.com
    docs: docs.magnetic-marten.com
    docs_internal: docs.homelab.magnetic-marten.com
    homepage: homepage.magnetic-marten.com
    homepage_internal: homepage.homelab.magnetic-marten.com
    n8n: n8n.magnetic-marten.com
    n8n_internal: n8n.homelab.magnetic-marten.com
    share: share.magnetic-marten.com
    share_internal: share.homelab.magnetic-marten.com
    zigbee: zigbee.homelab.magnetic-marten.com
    slzb_mr4: slzb-mr4.homelab.magnetic-marten.com
    changedetection: changedetection.homelab.magnetic-marten.com
    kuma: kuma.homelab.magnetic-marten.com
    ntfy: ntfy.homelab.magnetic-marten.com
    glances: glances.homelab.magnetic-marten.com
    cloudbeaver: db.homelab.magnetic-marten.com
    home_assistant: ha.homelab.magnetic-marten.com
    dev_admin: dev.homelab.magnetic-marten.com
    proxmox: proxmox.homelab.magnetic-marten.com
    haos: haos.homelab.magnetic-marten.com
    k3s_control: k3s-control.homelab.magnetic-marten.com
    k3s_worker: k3s-worker.homelab.magnetic-marten.com
    traefik: traefik.homelab.magnetic-marten.com

  ssh:
    user: ubuntu
    public_key_name: id_ed25519.pub
    private_key_name: id_ed25519

  proxmox:
    ssh_host: 192.168.10.100
    ssh_user: root
    ssh_port: 22
    api_user: homelab@pve
    api_token_name: automation
    validate_certs: false
    recreate_api_token: false
    node: pve
    bridge: vmbr0
    iso_storage: local
    snippets_storage: local
    vm_storage: local-lvm
    cloudinit_storage: local-lvm
    k3s_template_name: ubuntu-24-04-k3s-template
    k3s_template_vmid: 9000
    haos_template_name: haos-x86-64-template
    haos_template_vmid: 9010
    backup_storage_name: homelab-backup
    backup_mount_path: /mnt/homelab-backups
    backup_device: /dev/sda1
    backup_schedule: sat 03:00
    backup_retention: keep-last=4,keep-weekly=8,keep-monthly=3
    backup_mode: snapshot

  network:
    cidr_prefix: 24
    gateway: 192.168.10.1
    nameserver: 192.168.10.1
    searchdomain: magnetic-marten.com
    public_ipv4: 86.18.122.115
    traefik_lb_ip: 192.168.10.120
    metallb_range: 192.168.10.120-192.168.10.129

  storage:
    # Keep the legacy QuickDrop path only as a storage bridge while the worker
    # filesystem layout settles around Copyparty-owned storage.
    copyparty_share:
      proxmox_device: /dev/nvme0n1
      proxmox_device_by_id: /dev/disk/by-id/nvme-CT1000P3PSSD8_25044DC818B6
      guest_device_by_id: /dev/disk/by-id/scsi-0QEMU_QEMU_HARDDISK_drive-scsi1
      filesystem_label: copyparty-share
      mount_path: /var/lib/copyparty/share
    quickdrop_share:
      mount_path: /var/lib/quickdrop-share
      files_path: /var/lib/quickdrop-share/files
    copyparty_ingest:
      proxmox_device: /dev/sdb1
      filesystem_type: exfat
      filesystem_label: NINJA
      filesystem_uuid: 651F-B1B5
      samba_share_name: copyparty-ingest
      proxmox_mount_path: /srv/ingest/current
      proxmox_export_path: /srv/ingest/current
      worker_mount_path: /srv/ingest/current

  iot:
    slzb_mr4:
      ip: 192.168.30.100
      zigbee_adapter_type: ember
      zigbee_port: 6638
      thread_network_device: 192.168.30.100:7638

  packer:
    template_name: ubuntu-24-04-k3s-template
    template_vmid: 9000
    iso_url: https://releases.ubuntu.com/noble/ubuntu-24.04.3-live-server-amd64.iso
    iso_checksum: file:https://releases.ubuntu.com/noble/SHA256SUMS
    build_ip: 192.168.10.109
    ssh_username: ubuntu
    memory: 4096
    cores: 2
    disk_size: 30G

  haos:
    image_version: "16.3"
    image_url: "https://github.com/home-assistant/operating-system/releases/download/16.3/haos_ova-16.3.qcow2.xz"
    vmid: 112
    name: haos-01
    desired_ip: 192.168.10.112
    mac_address: "52:54:10:00:00:12"
    memory: 4096
    cores: 2
    disk_size: 32G

  home_assistant:
    sync:
      ssh_user: hassio
      ssh_port: 22
      remote_config_path: /config
      restart_after_sync: true

  dev_admin:
    vmid: 113
    name: dev-admin-01
    ip: 192.168.10.113
    memory: 8192
    cores: 4
    disk_size_gb: 80
    login_user: dev
    workspace_dir: /home/dev/workspace
    first_login_script: /home/dev/workspace/first-login.sh
    tools:
      codex_version: 0.116.0
      glances_version: 4.5.1
      helm_version: v4.1.3
      helix_version: 25.07.1
      lazygit_version: 0.56.0
      sops_version: 3.12.2

  k3s:
    version: v1.35.0+k3s1
    control:
      vmid: 110
      name: k3s-control-01
      ip: 192.168.10.110
      memory: 8192
      cores: 4
      disk_size_gb: 60
    worker:
      vmid: 111
      name: k3s-worker-01
      ip: 192.168.10.111
      memory: 8192
      cores: 4
      disk_size_gb: 80

  cert_manager:
    namespace: cert-manager
    version: v1.19.2
    email: admin@magnetic-marten.com
    cluster_issuer_name: letsencrypt-cloudflare
    private_key_secret_name: letsencrypt-cloudflare-account-key

  apps:
    coredns:
      namespace: dns
      image: coredns/coredns:1.13.1
      service_ip: 192.168.10.121
      upstream_resolver: 192.168.10.1
    homepage:
      namespace: homepage
      image: ghcr.io/gethomepage/homepage:v1.8.0
    astro_docs:
      namespace: astro-docs
      image: ghcr.io/bohdandan/homelab/astro-docs:0.1.0
    changedetection:
      namespace: changedetection
      image: dgtlmoon/changedetection.io:0.52.4
      data_storage: 10Gi
    uptime_kuma:
      namespace: uptime-kuma
      image: louislam/uptime-kuma:2.2.1
      data_storage: 10Gi
    ntfy:
      namespace: ntfy
      image: binwiederhier/ntfy:v2.15.0
      data_storage: 5Gi
    cloudbeaver:
      namespace: cloudbeaver
      image: dbeaver/cloudbeaver:26.0.1
      init_image: busybox:1.37.0
      data_storage: 10Gi
      port: 8978
      connection_name: n8n PostgreSQL
    n8n:
      namespace: n8n
      image: n8nio/n8n:2.2.6
      data_storage: 10Gi
    copyparty:
      namespace: copyparty
      # Upstream released v1.19.21, but Docker Hub has not published the
      # corresponding copyparty/ac image tag yet, so pin to the latest
      # available published image until the registry catches up.
      image: copyparty/ac:1.19.20
      admin_name_secret: copyparty_admin_name
      admin_password_secret: copyparty_admin_password
    mosquitto:
      namespace: mqtt
      image: eclipse-mosquitto:2.1.2-alpine
      service_ip: 192.168.10.122
      data_storage: 5Gi
    zigbee2mqtt:
      namespace: zigbee2mqtt
      image: ghcr.io/koenkk/zigbee2mqtt:2.7.2
      data_storage: 10Gi
      channel: 20
    postgres:
      namespace: n8n
      image: postgres:17-alpine
      data_storage: 20Gi
      database: n8n
      user: n8n
    glances:
      namespace: glances
      port: 61208
      service_name: glances
      host: glances.homelab.magnetic-marten.com
    cloudflared:
      namespace: cloudflared
      image: cloudflare/cloudflared:2025.11.1

  cloudflare:
    tunnel_name: homelab
    homepage_service: http://traefik.kube-system.svc.cluster.local:80
    n8n_service: http://traefik.kube-system.svc.cluster.local:80
