- name: Resolve K3s network snippet path
  ansible.builtin.command:
    cmd: >-
      pvesm path
      {{ homelab_effective.proxmox.snippets_storage }}:snippets/{{ k3s_vm.name }}-network.yaml
  register: k3s_network_snippet_path
  changed_when: false

- name: Ensure K3s network snippet directory exists
  ansible.builtin.file:
    path: "{{ (k3s_network_snippet_path.stdout | trim) | dirname }}"
    state: directory
    mode: "0755"

- name: Render K3s custom network snippet
  ansible.builtin.template:
    src: ../templates/k3s-network-snippet.yaml.j2
    dest: "{{ k3s_network_snippet_path.stdout | trim }}"
    mode: "0644"
  vars:
    k3s_network_vm: "{{ k3s_vm }}"
