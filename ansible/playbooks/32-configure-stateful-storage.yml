---
- name: Load local context
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Load context
      ansible.builtin.include_tasks: ../tasks/load_context.yml

- name: Remove legacy local file-sharing mounts from the stateful worker
  hosts: k3s_worker
  gather_facts: false
  become: true
  vars:
    legacy_copyparty_share_device: /dev/disk/by-id/scsi-0QEMU_QEMU_HARDDISK_drive-scsi1
    legacy_copyparty_share_mount_path: /var/lib/copyparty/share
    legacy_quickdrop_mount_path: /var/lib/quickdrop-share
    legacy_ingest_mount_path: /srv/ingest/current
  tasks:
    - name: Delete Copyparty share contents before unmounting the dedicated share disk
      ansible.builtin.shell: |
        set -eu
        if findmnt -n -M "{{ legacy_copyparty_share_mount_path }}" >/dev/null 2>&1; then
          find "{{ legacy_copyparty_share_mount_path }}" -mindepth 1 -maxdepth 1 -exec rm -rf -- {} +
        fi
      args:
        executable: /bin/bash

    - name: Force-unmount legacy QuickDrop compatibility mount
      ansible.builtin.shell: |
        umount -lf "{{ legacy_quickdrop_mount_path }}" || true
      args:
        executable: /bin/bash

    - name: Remove legacy QuickDrop compatibility fstab entry
      ansible.posix.mount:
        path: "{{ legacy_quickdrop_mount_path }}"
        state: absent_from_fstab

    - name: Force-unmount legacy removable ingest path on the worker
      ansible.builtin.shell: |
        umount -lf "{{ legacy_ingest_mount_path }}" || true
      args:
        executable: /bin/bash

    - name: Remove legacy removable ingest fstab entry on the worker
      ansible.posix.mount:
        path: "{{ legacy_ingest_mount_path }}"
        state: absent_from_fstab

    - name: Force-unmount legacy Copyparty share disk
      ansible.builtin.shell: |
        umount -lf "{{ legacy_copyparty_share_mount_path }}" || true
      args:
        executable: /bin/bash

    - name: Remove legacy Copyparty share fstab entry
      ansible.posix.mount:
        path: "{{ legacy_copyparty_share_mount_path }}"
        state: absent_from_fstab

    - name: Remove legacy share mountpoints from the worker
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ legacy_copyparty_share_mount_path }}"
        - "{{ legacy_quickdrop_mount_path }}"
        - "{{ legacy_ingest_mount_path }}"

- name: Remove legacy local file-sharing wiring from the Proxmox host
  hosts: proxmox
  gather_facts: false
  become: true
  vars:
    homelab_effective: "{{ hostvars['localhost'].homelab_effective }}"
    legacy_copyparty_share_device_by_id: /dev/disk/by-id/nvme-CT1000P3PSSD8_25044DC818B6
    legacy_ingest_mount_path: /srv/ingest/current
  tasks:
    - name: Remove legacy Copyparty ingest Samba share definition
      ansible.builtin.blockinfile:
        path: /etc/samba/smb.conf
        marker: "; {mark} ANSIBLE MANAGED COPYPARTY INGEST"
        state: absent
      register: legacy_copyparty_ingest_samba_share_removed

    - name: Restart Samba when the legacy ingest share definition changes
      ansible.builtin.service:
        name: smbd
        state: restarted
      when: legacy_copyparty_ingest_samba_share_removed.changed

    - name: Force-unmount legacy removable ingest mount on Proxmox
      ansible.builtin.shell: |
        umount -lf "{{ legacy_ingest_mount_path }}" || true
      args:
        executable: /bin/bash

    - name: Remove legacy removable ingest fstab entry on Proxmox
      ansible.posix.mount:
        path: "{{ legacy_ingest_mount_path }}"
        state: absent_from_fstab

    - name: Remove legacy removable ingest mountpoint on Proxmox
      ansible.builtin.file:
        path: "{{ legacy_ingest_mount_path }}"
        state: absent

    - name: Read current worker VM config
      ansible.builtin.command: "qm config {{ homelab_effective.k3s.worker.vmid }}"
      register: legacy_worker_vm_config
      changed_when: false

    - name: Detach the legacy dedicated Copyparty SSD from the worker VM
      ansible.builtin.command:
        cmd: "qm set {{ homelab_effective.k3s.worker.vmid }} --delete scsi1"
      when:
        - "'scsi1:' in legacy_worker_vm_config.stdout"
        - legacy_copyparty_share_device_by_id in legacy_worker_vm_config.stdout
