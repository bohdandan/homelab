---
- name: Load local context
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Load context
      ansible.builtin.include_tasks: ../tasks/load_context.yml

    - name: Check whether app and Cloudflare secrets are ready
      ansible.builtin.set_fact:
        homelab_app_secrets_ready: >-
          {{
            homelab_effective.secrets.cloudflare_api_token is defined
            and homelab_effective.secrets.cloudflare_api_token != 'replace-me'
            and homelab_effective.secrets.cloudflare_account_id is defined
            and homelab_effective.secrets.cloudflare_account_id != 'replace-me'
            and homelab_effective.secrets.cloudflare_zone_id is defined
            and homelab_effective.secrets.cloudflare_zone_id != 'replace-me'
            and (homelab_effective.secrets.cloudflare_access_allowed_emails | default([]) | length) > 0
            and (homelab_effective.secrets.cloudflare_access_allowed_emails | first) != 'replace-me@example.com'
            and homelab_effective.secrets.postgres_password is defined
            and homelab_effective.secrets.postgres_password != 'replace-me'
            and homelab_effective.secrets.n8n_encryption_key is defined
            and homelab_effective.secrets.n8n_encryption_key != 'replace-me'
            and homelab_effective.secrets.cloudbeaver_admin_name is defined
            and homelab_effective.secrets.cloudbeaver_admin_name != 'replace-me'
            and homelab_effective.secrets.cloudbeaver_admin_password is defined
            and homelab_effective.secrets.cloudbeaver_admin_password != 'replace-me'
            and homelab_effective.secrets.cloudflare_tunnel_token is defined
            and (homelab_effective.secrets.cloudflare_tunnel_token | length) > 0
          }}

    - name: Check whether Zigbee and MQTT secrets are ready
      ansible.builtin.set_fact:
        homelab_mqtt_secrets_ready: >-
          {{
            homelab_effective.secrets.mqtt_username is defined
            and homelab_effective.secrets.mqtt_username != 'replace-me'
            and homelab_effective.secrets.mqtt_password is defined
            and homelab_effective.secrets.mqtt_password != 'replace-me'
            and homelab_effective.secrets.zigbee2mqtt_network_key is defined
            and homelab_effective.secrets.zigbee2mqtt_network_key != 'replace-me'
          }}
        homelab_zigbee_stack_ready: >-
          {{
            homelab_effective.secrets.mqtt_username is defined
            and homelab_effective.secrets.mqtt_username != 'replace-me'
            and homelab_effective.secrets.mqtt_password is defined
            and homelab_effective.secrets.mqtt_password != 'replace-me'
            and homelab_effective.secrets.zigbee2mqtt_network_key is defined
            and homelab_effective.secrets.zigbee2mqtt_network_key != 'replace-me'
            and homelab_effective.iot.slzb_mr4.ip is defined
            and homelab_effective.iot.slzb_mr4.ip != 'replace-me'
            and homelab_effective.iot.slzb_mr4.ip != '0.0.0.0'
          }}

- name: Install cluster add-ons and workloads
  hosts: k3s_control
  become: true
  gather_facts: false
  vars:
    homelab_effective: "{{ hostvars['localhost'].homelab_effective }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  tasks:
    - name: Install MetalLB core manifests
      ansible.builtin.command:
        cmd: kubectl apply -f https://raw.githubusercontent.com/metallb/metallb/v0.14.8/config/manifests/metallb-native.yaml

    - name: Wait for MetalLB controller rollout
      ansible.builtin.command:
        cmd: kubectl rollout status deployment/controller -n metallb-system --timeout=180s

    - name: Render MetalLB custom resources
      ansible.builtin.template:
        src: ../../kubernetes/base/metallb/manifests.yaml.j2
        dest: /tmp/metallb-homelab.yaml
        mode: "0644"

    - name: Apply MetalLB custom resources
      ansible.builtin.command:
        cmd: kubectl apply -f /tmp/metallb-homelab.yaml

    - name: Patch Traefik service to use a fixed MetalLB VIP
      ansible.builtin.shell: |
        kubectl patch svc traefik -n kube-system --type merge \
          -p '{"spec":{"type":"LoadBalancer","loadBalancerIP":"{{ homelab_effective.network.traefik_lb_ip }}"}}'

    - name: Wait for Traefik external IP assignment
      ansible.builtin.shell: >-
        kubectl get svc traefik -n kube-system -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
      register: traefik_lb_ip
      retries: 30
      delay: 10
      until: traefik_lb_ip.stdout == homelab_effective.network.traefik_lb_ip

    - name: Render CoreDNS manifest
      ansible.builtin.template:
        src: ../../kubernetes/base/coredns/manifests.yaml.j2
        dest: /tmp/coredns.yaml
        mode: "0644"

    - name: Apply CoreDNS manifest
      ansible.builtin.command:
        cmd: kubectl apply -f /tmp/coredns.yaml

    - name: Restart CoreDNS deployment to pick up updated zone data
      ansible.builtin.command:
        cmd: kubectl rollout restart deployment/coredns -n {{ homelab_effective.apps.coredns.namespace }}

    - name: Wait for CoreDNS deployment
      ansible.builtin.command:
        cmd: kubectl rollout status deployment/coredns -n {{ homelab_effective.apps.coredns.namespace }} --timeout=240s

    - name: Install cert-manager
      ansible.builtin.command:
        cmd: kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/{{ homelab_effective.cert_manager.version }}/cert-manager.yaml

    - name: Read current cert-manager controller args
      ansible.builtin.command:
        cmd: >-
          kubectl -n {{ homelab_effective.cert_manager.namespace }} get deployment cert-manager
          -o jsonpath={.spec.template.spec.containers[0].args}
      register: cert_manager_controller_args
      changed_when: false

    - name: Patch cert-manager deployment to use public recursive resolvers for DNS-01 self-checks
      ansible.builtin.shell: |
        kubectl -n {{ homelab_effective.cert_manager.namespace }} patch deployment cert-manager --type=json \
          -p='[
            {"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--dns01-recursive-nameservers=1.1.1.1:53,1.0.0.1:53"},
            {"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--dns01-recursive-nameservers-only"}
          ]'
      when: "'--dns01-recursive-nameservers=1.1.1.1:53,1.0.0.1:53' not in cert_manager_controller_args.stdout"

    - name: Wait for cert-manager deployment
      ansible.builtin.command:
        cmd: kubectl rollout status deployment/cert-manager -n {{ homelab_effective.cert_manager.namespace }} --timeout=240s

    - name: Report skipped Mosquitto rollout
      ansible.builtin.debug:
        msg: >-
          Skipping Mosquitto until mqtt_username, mqtt_password, and zigbee2mqtt_network_key are populated
          in ansible/group_vars/all/secrets.sops.yaml.
      when: not (hostvars['localhost'].homelab_mqtt_secrets_ready | bool)

    - name: Render Mosquitto manifest
      ansible.builtin.template:
        src: ../../kubernetes/base/mosquitto/manifests.yaml.j2
        dest: /tmp/mosquitto.yaml
        mode: "0644"
      when: hostvars['localhost'].homelab_mqtt_secrets_ready | bool

    - name: Apply Mosquitto manifest
      ansible.builtin.command:
        cmd: kubectl apply -f /tmp/mosquitto.yaml
      when: hostvars['localhost'].homelab_mqtt_secrets_ready | bool

    - name: Report skipped Zigbee2MQTT rollout
      ansible.builtin.debug:
        msg: >-
          Skipping Zigbee2MQTT until the SLZB-MR4 IP is recorded in ansible/group_vars/all/main.yml
          with a real LAN address instead of 0.0.0.0.
      when: not (hostvars['localhost'].homelab_zigbee_stack_ready | bool)

    - name: Render Zigbee2MQTT manifest
      ansible.builtin.template:
        src: ../../kubernetes/base/zigbee2mqtt/manifests.yaml.j2
        dest: /tmp/zigbee2mqtt.yaml
        mode: "0644"
      when: hostvars['localhost'].homelab_zigbee_stack_ready | bool

    - name: Apply Zigbee2MQTT manifest
      ansible.builtin.command:
        cmd: kubectl apply -f /tmp/zigbee2mqtt.yaml
      when: hostvars['localhost'].homelab_zigbee_stack_ready | bool

    - name: Report skipped secret-dependent workloads
      ansible.builtin.debug:
        msg: >-
          MetalLB and cert-manager are installed. Skipping ClusterIssuer, homepage, ChangeDetection,
          Uptime Kuma, ntfy, Glances ingress, CloudBeaver, n8n, QuickDrop, Home Assistant proxy, and cloudflared
          until real Cloudflare and application secrets are present in ansible/group_vars/all/secrets.sops.yaml.
      when: not (hostvars['localhost'].homelab_app_secrets_ready | bool)

    - name: Create Cloudflare API token secret for cert-manager
      ansible.builtin.shell: |
        cat <<'EOF' | kubectl apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: cloudflare-api-token
          namespace: {{ homelab_effective.cert_manager.namespace }}
        type: Opaque
        stringData:
          api-token: {{ homelab_effective.secrets.cloudflare_api_token }}
        EOF
      when: hostvars['localhost'].homelab_app_secrets_ready | bool

    - name: Render cert-manager ClusterIssuer
      ansible.builtin.template:
        src: ../../kubernetes/base/cert-manager/cluster-issuer.yaml.j2
        dest: /tmp/cert-manager-cluster-issuer.yaml
        mode: "0644"
      when: hostvars['localhost'].homelab_app_secrets_ready | bool

    - name: Apply cert-manager ClusterIssuer
      ansible.builtin.command:
        cmd: kubectl apply -f /tmp/cert-manager-cluster-issuer.yaml
      when: hostvars['localhost'].homelab_app_secrets_ready | bool

    - name: Render homepage manifest
      ansible.builtin.template:
        src: ../../kubernetes/base/homepage/manifests.yaml.j2
        dest: /tmp/homepage.yaml
        mode: "0644"
      when: hostvars['localhost'].homelab_app_secrets_ready | bool

    - name: Apply homepage manifest
      ansible.builtin.command:
        cmd: kubectl apply -f /tmp/homepage.yaml
      when: hostvars['localhost'].homelab_app_secrets_ready | bool

    - name: Render ChangeDetection manifest
      ansible.builtin.template:
        src: ../../kubernetes/base/changedetection/manifests.yaml.j2
        dest: /tmp/changedetection.yaml
        mode: "0644"
      when: hostvars['localhost'].homelab_app_secrets_ready | bool

    - name: Apply ChangeDetection manifest
      ansible.builtin.command:
        cmd: kubectl apply -f /tmp/changedetection.yaml
      when: hostvars['localhost'].homelab_app_secrets_ready | bool

    - name: Render Uptime Kuma manifest
      ansible.builtin.template:
        src: ../../kubernetes/base/uptime-kuma/manifests.yaml.j2
        dest: /tmp/uptime-kuma.yaml
        mode: "0644"
      when: hostvars['localhost'].homelab_app_secrets_ready | bool

    - name: Apply Uptime Kuma manifest
      ansible.builtin.command:
        cmd: kubectl apply -f /tmp/uptime-kuma.yaml
      when: hostvars['localhost'].homelab_app_secrets_ready | bool

    - name: Render ntfy manifest
      ansible.builtin.template:
        src: ../../kubernetes/base/ntfy/manifests.yaml.j2
        dest: /tmp/ntfy.yaml
        mode: "0644"
      when: hostvars['localhost'].homelab_app_secrets_ready | bool

    - name: Apply ntfy manifest
      ansible.builtin.command:
        cmd: kubectl apply -f /tmp/ntfy.yaml
      when: hostvars['localhost'].homelab_app_secrets_ready | bool

    - name: Render Glances ingress manifest
      ansible.builtin.template:
        src: ../../kubernetes/base/glances/manifests.yaml.j2
        dest: /tmp/glances.yaml
        mode: "0644"
      when: hostvars['localhost'].homelab_app_secrets_ready | bool

    - name: Apply Glances ingress manifest
      ansible.builtin.command:
        cmd: kubectl apply -f /tmp/glances.yaml
      when: hostvars['localhost'].homelab_app_secrets_ready | bool

    - name: Render CloudBeaver manifest
      ansible.builtin.template:
        src: ../../kubernetes/base/cloudbeaver/manifests.yaml.j2
        dest: /tmp/cloudbeaver.yaml
        mode: "0644"
      when: hostvars['localhost'].homelab_app_secrets_ready | bool

    - name: Apply CloudBeaver manifest
      ansible.builtin.command:
        cmd: kubectl apply -f /tmp/cloudbeaver.yaml
      when: hostvars['localhost'].homelab_app_secrets_ready | bool

    - name: Render n8n manifest
      ansible.builtin.template:
        src: ../../kubernetes/base/n8n/manifests.yaml.j2
        dest: /tmp/n8n.yaml
        mode: "0644"
      when: hostvars['localhost'].homelab_app_secrets_ready | bool

    - name: Apply n8n manifest
      ansible.builtin.command:
        cmd: kubectl apply -f /tmp/n8n.yaml
      when: hostvars['localhost'].homelab_app_secrets_ready | bool

    - name: Render QuickDrop manifest
      ansible.builtin.template:
        src: ../../kubernetes/base/quickdrop/manifests.yaml.j2
        dest: /tmp/quickdrop.yaml
        mode: "0644"
      when: hostvars['localhost'].homelab_app_secrets_ready | bool

    - name: Apply QuickDrop manifest
      ansible.builtin.command:
        cmd: kubectl apply -f /tmp/quickdrop.yaml
      when: hostvars['localhost'].homelab_app_secrets_ready | bool

    - name: Render Home Assistant proxy manifest
      ansible.builtin.template:
        src: ../../kubernetes/base/home-assistant-proxy/manifests.yaml.j2
        dest: /tmp/home-assistant-proxy.yaml
        mode: "0644"
      when: hostvars['localhost'].homelab_app_secrets_ready | bool

    - name: Apply Home Assistant proxy manifest
      ansible.builtin.command:
        cmd: kubectl apply -f /tmp/home-assistant-proxy.yaml
      when: hostvars['localhost'].homelab_app_secrets_ready | bool

    - name: Render cloudflared manifest
      ansible.builtin.template:
        src: ../../kubernetes/base/cloudflared/manifests.yaml.j2
        dest: /tmp/cloudflared.yaml
        mode: "0644"
      when: hostvars['localhost'].homelab_app_secrets_ready | bool

    - name: Apply cloudflared manifest
      ansible.builtin.command:
        cmd: kubectl apply -f /tmp/cloudflared.yaml
      when: hostvars['localhost'].homelab_app_secrets_ready | bool

    - name: Wait for homepage deployment
      ansible.builtin.command:
        cmd: kubectl rollout status deployment/homepage -n {{ homelab_effective.apps.homepage.namespace }} --timeout=240s
      when: hostvars['localhost'].homelab_app_secrets_ready | bool

    - name: Wait for ChangeDetection deployment
      ansible.builtin.command:
        cmd: kubectl rollout status deployment/changedetection -n {{ homelab_effective.apps.changedetection.namespace }} --timeout=240s
      when: hostvars['localhost'].homelab_app_secrets_ready | bool

    - name: Wait for Uptime Kuma deployment
      ansible.builtin.command:
        cmd: kubectl rollout status deployment/uptime-kuma -n {{ homelab_effective.apps.uptime_kuma.namespace }} --timeout=240s
      when: hostvars['localhost'].homelab_app_secrets_ready | bool

    - name: Wait for ntfy deployment
      ansible.builtin.command:
        cmd: kubectl rollout status deployment/ntfy -n {{ homelab_effective.apps.ntfy.namespace }} --timeout=240s
      when: hostvars['localhost'].homelab_app_secrets_ready | bool

    - name: Wait for Mosquitto deployment
      ansible.builtin.command:
        cmd: kubectl rollout status deployment/mosquitto -n {{ homelab_effective.apps.mosquitto.namespace }} --timeout=240s
      when: hostvars['localhost'].homelab_mqtt_secrets_ready | bool

    - name: Wait for Zigbee2MQTT deployment
      ansible.builtin.command:
        cmd: kubectl rollout status deployment/zigbee2mqtt -n {{ homelab_effective.apps.zigbee2mqtt.namespace }} --timeout=240s
      when: hostvars['localhost'].homelab_zigbee_stack_ready | bool

    - name: Wait for CloudBeaver deployment
      ansible.builtin.command:
        cmd: kubectl rollout status deployment/cloudbeaver -n {{ homelab_effective.apps.cloudbeaver.namespace }} --timeout=240s
      when: hostvars['localhost'].homelab_app_secrets_ready | bool

    - name: Wait for n8n deployment
      ansible.builtin.command:
        cmd: kubectl rollout status deployment/n8n -n {{ homelab_effective.apps.n8n.namespace }} --timeout=240s
      when: hostvars['localhost'].homelab_app_secrets_ready | bool

    - name: Wait for QuickDrop deployment
      ansible.builtin.command:
        cmd: kubectl rollout status deployment/quickdrop -n {{ homelab_effective.apps.quickdrop.namespace }} --timeout=240s
      when: hostvars['localhost'].homelab_app_secrets_ready | bool

    - name: Wait for cloudflared deployment
      ansible.builtin.command:
        cmd: kubectl rollout status deployment/cloudflared -n {{ homelab_effective.apps.cloudflared.namespace }} --timeout=240s
      when: hostvars['localhost'].homelab_app_secrets_ready | bool
